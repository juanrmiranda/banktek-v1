  #   working_dir: /usr/src/app
  #   volumes:
  #     - ./microservices:/usr/src/app
  #   command: sh -c "npm install && npm run dev"
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - core_net

volumes:
  pgdata:

networks:
  frontend_net:
    driver: bridge

  backend_net:
    driver: bridge
